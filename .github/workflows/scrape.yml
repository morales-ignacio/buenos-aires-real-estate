name: Daily scrape

on:
  schedule:
    - cron: "0 12 * * *"         
  workflow_dispatch:        

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
      - name: Run the scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python pipeline/run.py            